<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund System - Auto Test Run</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .test-run {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .test-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }
        .test-card.running {
            border-color: #fbbf24;
            background: #fffbeb;
        }
        .test-card.pass {
            border-color: #10b981;
            background: #ecfdf5;
        }
        .test-card.fail {
            border-color: #ef4444;
            background: #fef2f2;
        }
        .test-card h3 {
            margin: 0 0 10px 0;
            color: #1f2937;
        }
        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .status.running {
            background: #fbbf24;
            color: #78350f;
            animation: pulse 1s infinite;
        }
        .status.pass {
            background: #10b981;
            color: white;
        }
        .status.fail {
            background: #ef4444;
            color: white;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .details {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
        }
        .summary {
            background: #f3f4f6;
            border-radius: 8px;
            padding: 20px;
            margin: 30px 0;
            text-align: center;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.5s ease;
        }
        .counter {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            text-align: center;
        }
        .results-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .result-item {
            background: white;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .result-count {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        .result-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .start-btn {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .start-btn:hover {
            transform: scale(1.05);
        }
        .start-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Refund System - Full Test Run</h1>
        <p class="subtitle">Testing automatic refund flagging and processing</p>

        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>

        <div class="summary">
            <div class="counter" id="testCounter">0/4</div>
            <div id="currentTest" style="color: #666; margin-top: 10px;">Ready to start</div>
        </div>

        <div class="results-summary">
            <div class="result-item">
                <div class="result-count" id="passCount" style="color: #10b981;">0</div>
                <div class="result-label">PASSED</div>
            </div>
            <div class="result-item">
                <div class="result-count" id="failCount" style="color: #ef4444;">0</div>
                <div class="result-label">FAILED</div>
            </div>
            <div class="result-item">
                <div class="result-count" id="totalCount" style="color: #667eea;">0</div>
                <div class="result-label">TOTAL</div>
            </div>
        </div>

        <button class="start-btn" id="startBtn" onclick="runAllTests()">▶ Start All Tests</button>

        <div class="test-run" id="testContainer"></div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="http://localhost:5173/refund-test.html" style="color: #667eea; text-decoration: none; font-weight: 600;">
                ← Back to Interactive Tests
            </a>
        </div>
    </div>

    <script>
        class MockDashboard {
            constructor() {
                this.bookings = [];
            }

            createBooking(booking) {
                this.bookings.push(booking);
                return booking;
            }

            cancelBooking(bookingId) {
                const booking = this.bookings.find(b => b.id === bookingId);
                if (!booking) return false;

                booking.status = 'cancelled';
                if (booking.paymentStatus === 'paid' && booking.amountPaid) {
                    booking.paymentStatus = 'refund_pending';
                    booking.refundAmount = booking.amountPaid;
                }
                return true;
            }

            processRefund(bookingId, refundAmount, refundNotes) {
                const booking = this.bookings.find(b => b.id === bookingId);
                if (!booking) return false;

                booking.paymentStatus = 'refunded';
                booking.refundAmount = refundAmount;
                booking.refundDate = new Date();
                booking.refundNotes = refundNotes || '';
                return true;
            }

            getBooking(bookingId) {
                return this.bookings.find(b => b.id === bookingId);
            }
        }

        const dashboard = new MockDashboard();
        let results = { pass: 0, fail: 0 };

        function createTestCard(testNum, title, description) {
            const container = document.getElementById('testContainer');
            const card = document.createElement('div');
            card.className = 'test-card';
            card.id = `test-${testNum}`;
            card.innerHTML = `
                <h3>Test ${testNum}: ${title}</h3>
                <div class="status running" id="status-${testNum}">⏳ Running...</div>
                <div class="details">${description}</div>
            `;
            container.appendChild(card);
            return card;
        }

        function updateTestCard(testNum, passed, details) {
            const card = document.getElementById(`test-${testNum}`);
            const status = document.getElementById(`status-${testNum}`);
            const detailsEl = card.querySelector('.details');

            card.classList.remove('running');
            if (passed) {
                card.classList.add('pass');
                status.textContent = '✅ PASSED';
                status.className = 'status pass';
                results.pass++;
            } else {
                card.classList.add('fail');
                status.textContent = '❌ FAILED';
                status.className = 'status fail';
                results.fail++;
            }

            detailsEl.innerHTML = details;
            updateSummary();
        }

        function updateSummary() {
            const total = results.pass + results.fail;
            document.getElementById('passCount').textContent = results.pass;
            document.getElementById('failCount').textContent = results.fail;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('progressBar').style.width = (total / 4 * 100) + '%';
            document.getElementById('testCounter').textContent = `${total}/4`;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function runAllTests() {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('testContainer').innerHTML = '';
            results = { pass: 0, fail: 0 };

            // Test 1: Cancel Paid Booking
            document.getElementById('currentTest').textContent = 'Running: Cancel Paid Booking...';
            createTestCard(1, 'Cancel Paid Booking', 'Creating booking with payment → Cancelling → Verifying auto-flag');
            await sleep(1000);
            
            try {
                const booking1 = {
                    id: 'booking-001',
                    serviceType: 'Transmission Fluid Change',
                    scheduledDate: new Date(),
                    status: 'scheduled',
                    paymentStatus: 'paid',
                    amountPaid: 1500
                };
                dashboard.createBooking(booking1);
                dashboard.cancelBooking('booking-001');
                const cancelled = dashboard.getBooking('booking-001');

                const passed1 = cancelled.paymentStatus === 'refund_pending' && cancelled.refundAmount === 1500;
                updateTestCard(1, passed1, `
                    ✓ Booking created: ${booking1.serviceType}<br>
                    ✓ Payment: GH₵${booking1.amountPaid}<br>
                    ✓ Cancelled booking<br>
                    ✓ Payment Status: ${cancelled.paymentStatus}<br>
                    ✓ Refund Amount: GH₵${cancelled.refundAmount}<br>
                    <br>
                    ${passed1 ? '✅ System correctly auto-flagged for refund' : '❌ Refund flag not applied'}
                `);
            } catch (e) {
                updateTestCard(1, false, `❌ Error: ${e.message}`);
            }

            await sleep(1500);

            // Test 2: Process Refund
            document.getElementById('currentTest').textContent = 'Running: Process Refund...';
            createTestCard(2, 'Process Refund', 'Marking cancelled booking as refunded → Verifying status update');
            await sleep(1000);

            try {
                dashboard.processRefund('booking-001', 1500, 'Paystack reversal - Ref TX123');
                const refunded = dashboard.getBooking('booking-001');

                const passed2 = refunded.paymentStatus === 'refunded' && refunded.refundDate && refunded.refundNotes;
                updateTestCard(2, passed2, `
                    ✓ Processing refund for booking<br>
                    ✓ Refund Amount: GH₵${refunded.refundAmount}<br>
                    ✓ Payment Status: ${refunded.paymentStatus}<br>
                    ✓ Refund Date: ${refunded.refundDate.toLocaleDateString()}<br>
                    ✓ Notes: "${refunded.refundNotes}"<br>
                    <br>
                    ${passed2 ? '✅ Refund successfully marked as complete' : '❌ Refund update failed'}
                `);
            } catch (e) {
                updateTestCard(2, false, `❌ Error: ${e.message}`);
            }

            await sleep(1500);

            // Test 3: Cancel Free Booking
            document.getElementById('currentTest').textContent = 'Running: Cancel Free Booking...';
            createTestCard(3, 'Cancel Free Booking', 'Creating free booking → Cancelling → Verifying no refund flag');
            await sleep(1000);

            try {
                const booking3 = {
                    id: 'booking-003',
                    serviceType: 'Vehicle Inspection',
                    scheduledDate: new Date(),
                    status: 'scheduled',
                    paymentStatus: 'unpaid',
                    amountPaid: null
                };
                dashboard.createBooking(booking3);
                dashboard.cancelBooking('booking-003');
                const cancelled3 = dashboard.getBooking('booking-003');

                const passed3 = cancelled3.paymentStatus !== 'refund_pending' && !cancelled3.refundAmount;
                updateTestCard(3, passed3, `
                    ✓ Booking created: ${booking3.serviceType}<br>
                    ✓ Payment Status: ${booking3.paymentStatus}<br>
                    ✓ Amount Paid: None (free service)<br>
                    ✓ Cancelled booking<br>
                    ✓ Refund Flag: ${cancelled3.refundAmount ? 'Set (wrong!)' : 'Not set (correct)'}<br>
                    <br>
                    ${passed3 ? '✅ Correctly skipped refund for free booking' : '❌ Incorrectly flagged free booking'}
                `);
            } catch (e) {
                updateTestCard(3, false, `❌ Error: ${e.message}`);
            }

            await sleep(1500);

            // Test 4: Partial Refund
            document.getElementById('currentTest').textContent = 'Running: Partial Refund...';
            createTestCard(4, 'Partial Refund', 'Creating booking → Processing partial refund with fee deduction');
            await sleep(1000);

            try {
                const booking4 = {
                    id: 'booking-004',
                    serviceType: 'Full Service',
                    scheduledDate: new Date(),
                    status: 'scheduled',
                    paymentStatus: 'paid',
                    amountPaid: 2000
                };
                dashboard.createBooking(booking4);
                dashboard.cancelBooking('booking-004');
                dashboard.processRefund('booking-004', 1500, 'GH₵500 cancellation fee applied');
                const partial = dashboard.getBooking('booking-004');

                const fee = booking4.amountPaid - partial.refundAmount;
                const passed4 = partial.refundAmount === 1500 && fee === 500;
                updateTestCard(4, passed4, `
                    ✓ Booking created: ${booking4.serviceType}<br>
                    ✓ Original Amount: GH₵${booking4.amountPaid}<br>
                    ✓ Cancelled booking<br>
                    ✓ Processing partial refund<br>
                    ✓ Refund Amount: GH₵${partial.refundAmount}<br>
                    ✓ Cancellation Fee: GH₵${fee}<br>
                    ✓ Notes: "${partial.refundNotes}"<br>
                    <br>
                    ${passed4 ? '✅ Partial refund processed correctly' : '❌ Refund calculation error'}
                `);
            } catch (e) {
                updateTestCard(4, false, `❌ Error: ${e.message}`);
            }

            await sleep(1000);

            // Final summary
            const allPassed = results.pass === 4;
            document.getElementById('currentTest').textContent = allPassed 
                ? '✅ All tests passed! System working perfectly.' 
                : `⚠️ ${results.pass}/4 tests passed`;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = '▶ Run Tests Again';
        }

        // Auto-run on load
        window.addEventListener('load', () => {
            setTimeout(() => {
                runAllTests();
            }, 500);
        });
    </script>
</body>
</html>
